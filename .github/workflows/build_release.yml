name: Build and Release

on:
  workflow_dispatch:
  push:
  pull_request:
    paths:
      - src/**
      - cmake/**
      - "**/CMakeLists.txt"
      - CMakePresets.json
      - .github/workflows/build_release.yml
      - vcpkg.json
      - "!**/Makefile*"

permissions:
  contents: write
  actions: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: "Linux ${{ matrix.environment.arch }}, ${{ matrix.ui.name }}, ${{ matrix.build.name }}, ${{ matrix.dynarec.name }}"
    runs-on: ${{ matrix.environment.runner }}

    strategy:
      fail-fast: false
      matrix:
        build:
          - name: Debug
            preset: dev_debug
            slug: -Debug
          - name: Dev
            preset: development
            slug: -Dev
        dynarec:
          - name: ODR
            new: off
            slug: -ODR
          - name: NDR
            new: on
            slug: -NDR
        ui:
          - name: SDL GUI
            qt: off
            slug: ""
            packages: ""
          - name: Qt GUI
            qt: on
            slug: -Qt
            packages: >-
              qtbase5-dev
              qtbase5-private-dev
              qttools5-dev
              qttranslations5-l10n
              libevdev-dev
              libxkbcommon-x11-dev
        environment:
          - arch: x86_64
            toolchain: ./cmake/flags-gcc-x86_64.cmake
            slug: -x86_64
            runner: ubuntu-22.04
          - arch: arm64
            toolchain: ./cmake/flags-gcc-aarch64.cmake
            slug: -arm64
            runner: ubuntu-22.04-arm
        exclude:
          - dynarec:
              new: off
            environment:
              arch: arm64

    steps:
      - name: Install dependencies
        run: >-
          sudo apt update && sudo apt install -y
          build-essential
          ninja-build
          libfreetype-dev
          libsdl2-dev
          libpng-dev
          libc6-dev
          librtmidi-dev
          libopenal-dev
          libslirp-dev
          libfluidsynth-dev
          libvdeplug-dev
          libserialport-dev
          ${{ matrix.ui.packages }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: >-
          cmake -S . -B build --preset ${{ matrix.build.preset }}
          --toolchain ${{ matrix.environment.toolchain }}
          -D NEW_DYNAREC=${{ matrix.dynarec.new }}
          -D QT=${{ matrix.ui.qt }}

      - name: Build
        run: cmake --build build

      - name: Generate package
        run: cmake --install build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 86Box${{ matrix.ui.slug }}${{ matrix.dynarec.slug }}${{ matrix.build.slug }}-UbuntuJammy${{ matrix.environment.slug }}-gha${{ github.run_number }}
          path: build/artifacts/**
          if-no-files-found: ignore

  macos:
    name: "macOS arm64, ${{ matrix.ui.name }}, ${{ matrix.build.name }}, NDR"
    runs-on: macos-15

    strategy:
      fail-fast: false
      matrix:
        build:
          - name: Debug
            preset: dev_debug
            slug: -Debug
          - name: Dev
            preset: development
            slug: -Dev
        ui:
          - name: SDL GUI
            qt: off
            slug: ""
            packages: ""
          - name: Qt GUI
            qt: on
            slug: -Qt
            packages: qt@5

    steps:
      - name: Install dependencies
        run: >-
          brew install
          sdl2
          rtmidi
          openal-soft
          fluidsynth
          libslirp
          vde
          libserialport
          ${{ matrix.ui.packages }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: |
          openal_prefix="$(brew --prefix openal-soft)"
          libserialport_prefix="$(brew --prefix libserialport)"
          cmake_args=(
            -G Ninja
            -S .
            -B build
            --preset ${{ matrix.build.preset }}
            --toolchain ./cmake/llvm-macos-aarch64.cmake
            -D NEW_DYNAREC=on
            -D CMAKE_INSTALL_PREFIX=./build/artifacts
            -D QT=${{ matrix.ui.qt }}
            -D OpenAL_ROOT="$openal_prefix"
            -D LIBSERIALPORT_ROOT="$libserialport_prefix"
          )
          if [ "${{ matrix.ui.qt }}" = "on" ]; then
            qt_prefix="$(brew --prefix qt@5)"
            cmake_args+=(
              -D USE_QT6=OFF
              -D CMAKE_PREFIX_PATH="$qt_prefix"
            )
          fi
          cmake "${cmake_args[@]}"

      - name: Build
        run: cmake --build build

      - name: Generate package
        run: cmake --install build

      - name: Fix app permissions
        run: find build/artifacts -path "*.app/Contents/MacOS/*" -type f -exec chmod 755 {} \;

      - name: Ad-hoc sign app
        run: |
          for app in build/artifacts/*.app; do
            codesign --force --deep -s - "$app"
          done

      - name: Zip app with ditto
        run: |
          artifact="86Box${{ matrix.ui.slug }}-NDR${{ matrix.build.slug }}-macOS-arm64-gha${{ github.run_number }}"
          for app in build/artifacts/*.app; do
            /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$app" "build/artifacts/${artifact}.zip"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 86Box${{ matrix.ui.slug }}-NDR${{ matrix.build.slug }}-macOS-arm64-gha${{ github.run_number }}
          path: build/artifacts/*.zip
          if-no-files-found: ignore

  windows:
    name: "Windows ${{ matrix.environment.msystem }}, Qt 5 GUI, ${{ matrix.build.name }}, ${{ matrix.dynarec.name }}"
    runs-on: ${{ matrix.environment.runner }}

    strategy:
      fail-fast: false
      matrix:
        build:
          - name: Debug
            preset: dev_debug
            slug: -Debug
          - name: Dev
            preset: development
            slug: -Dev
        dynarec:
          - name: ODR
            new: off
            slug: -ODR
          - name: NDR
            new: on
            slug: -NDR
        environment:
          - msystem: UCRT64
            toolchain: ./cmake/flags-gcc-x86_64.cmake
            slug: -64
            runner: windows-2022
          - msystem: CLANGARM64
            toolchain: ./cmake/flags-gcc-aarch64.cmake
            slug: -arm64
            runner: windows-11-arm
        exclude:
          - dynarec:
              new: off
            environment:
              msystem: CLANGARM64

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Prepare MSYS2 environment
        uses: msys2/setup-msys2@v2
        with:
          release: true
          update: true
          msystem: ${{ matrix.environment.msystem }}
          pacboy: >-
            ninja:p cmake:p gcc:p pkgconf:p freetype:p SDL2:p zlib:p libpng:p
            openal:p rtmidi:p libslirp:p fluidsynth:p libserialport:p qt5-static:p
            vulkan-headers:p llvm-openmp:p

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: >-
          cmake -G Ninja -S . -B build --preset ${{ matrix.build.preset }}
          --toolchain ${{ matrix.environment.toolchain }}
          -D NEW_DYNAREC=${{ matrix.dynarec.new }}
          -D QT=on

      - name: Build
        run: cmake --build build

      - name: Generate package
        run: cmake --install build

      - name: Ensure floppy sounds next to EXE
        run: |
          set -eo pipefail
          exe=$(find build/artifacts -maxdepth 4 -type f -iname "86Box*.exe" -print -quit)
          if [ -z "$exe" ]; then
            echo "No EXE found under build/artifacts; skipping copy"
            exit 0
          fi
          exedir=$(dirname "$exe")
          if [ ! -d "$exedir/floppysounds" ]; then
            mkdir -p "$exedir/floppysounds"
            cp -r floppysounds/* "$exedir/floppysounds/" || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 86Box${{ matrix.dynarec.slug }}${{ matrix.build.slug }}-Windows${{ matrix.environment.slug }}-gha${{ github.run_number }}
          path: build/artifacts/**
          if-no-files-found: ignore

  release:
    name: Publish release artifacts
    needs:
      - linux
      - macos
      - windows
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.sha }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide release tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="autobuild-$(git rev-parse --short "$GITHUB_SHA")"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download successful build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          count=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" --jq '.total_count')
          if [ "$count" -eq 0 ]; then
            echo "No artifacts were produced by successful builds."
            exit 0
          fi
          mkdir -p dist
          gh run download "$GITHUB_RUN_ID" --dir dist

      - name: Package release assets
        run: |
          set -euo pipefail
          if [ ! -d dist ] || [ -z "$(find dist -mindepth 1 -maxdepth 1 -type d -print -quit)" ]; then
            echo "No artifact directories to package."
            exit 0
          fi
          mkdir -p release-assets
          for dir in dist/*/; do
            name="$(basename "$dir")"
            zip_count=$(find "$dir" -mindepth 1 -maxdepth 1 -type f -name "*.zip" | wc -l | tr -d ' ')
            entry_count=$(find "$dir" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')
            if [ "$zip_count" -eq 1 ] && [ "$entry_count" -eq 1 ]; then
              cp "$dir"/*.zip "release-assets/${name}.zip"
            else
              (cd "$dir" && zip -r "../../release-assets/${name}.zip" .)
            fi
          done
          ls -lah release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ ! -d release-assets ] || [ -z "$(find release-assets -type f -name "*.zip" -print -quit)" ]; then
            echo "No release assets to upload."
            exit 0
          fi
          tag="${{ steps.vars.outputs.tag }}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --target "$GITHUB_SHA" --title "86Box nightly - $tag" --notes "Automated build artifacts for $GITHUB_SHA."
          gh release upload "$tag" release-assets/*.zip --clobber
